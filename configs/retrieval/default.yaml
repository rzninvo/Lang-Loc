# DualSceneAlignerV2 + SimpleGraphMatcher configuration (scene retrieval, §3.2).
# Tables 1+2+3 evaluation lives in `langloc/retrieval/eval.py` (argparse-based,
# cache-driven) and is not Hydra-configured.

# Model architecture
node_input_dim: 518       # centroid(3) + color(3) + CLIP(512)
hidden_dim: 256           # GNN hidden / output dimension
dropout: 0.0              # V2 base — the fusion head has its own 0.3

# Training (paper recipe — published `epoch_{N}_163_cliprel.pth` checkpoint).
# The `163` in the filename is literal: 163 ScanScribe train scan_ids.
lr: 0.001                 # CLI lr; the optimizer uses lr*0.5 (= 5e-4)
weight_decay: 0.0001
batch_size: 16
epochs: 70
temperature: 0.07         # supervised contrastive loss τ
warmup_ratio: 0.1         # 10% linear warmup
cosine_floor: 0.1         # cosine schedule floor multiplier
negative_ratio: 0.5       # fraction of explicit-negative pairs in DataLoader
log_every: 50
seed: 42                  # Project-wide canonical seed.

# Scoring weights (Eq. 8: w_emb·cos(z,z) + w_scene·cos(u,u) + w_jac·F1)
w_emb: 0.33
w_scene: 0.33
w_jac: 0.34

# Data paths (override via CLI)
dataset_dir: null          # Training data dir (combined_dataset_clip/ — built by
                           # scripts/retrieval/build_combined_dataset_clip.py)
metadata_path: null        # 3RScan.json (scan_id → reference_id mapping)
save_dir: data/model_checkpoints/graph2graph
pretrained_checkpoint: null

# CLIP model used for node/edge/scene embeddings across all retrieval scripts.
clip_model: ViT-B/32

# SceneGraph constructor params (selects which pre-computed embeddings to load;
# the retrieval model itself re-encodes everything with CLIP, so this only
# affects the legacy node.label_features / edge.features fields).
max_dist: 1.0
embedding_type: word2vec
