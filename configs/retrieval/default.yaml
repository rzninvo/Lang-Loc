# DualSceneAlignerV2 + SimpleGraphMatcher configuration (scene retrieval, §3.2).
# Tables 1+2 evaluation lives in `langloc/retrieval/eval.py` (argparse-based,
# cache-driven) and is not Hydra-configured.

# Model architecture
node_input_dim: 518       # centroid(3) + color(3) + CLIP(512)
hidden_dim: 256           # GNN hidden / output dimension
dropout: 0.0              # Shirley's V2 base uses 0.0 (fusion head has its own 0.3)

# Training — bit-faithful to Shirley's `train_withscene_clip_518_multitask_v2.py`
# (the actual script that produced epoch_70_163_cliprel.pth). The `_163_` in the
# filename is literal; it refers to the 163 ScanScribe train scan_ids.
lr: 0.001                 # CLI lr; the optimizer uses lr*0.5 (= 5e-4) (Shirley's recipe)
weight_decay: 0.0001
batch_size: 16            # Shirley's V2 multitask training (notebook cell)
epochs: 70                # Shirley's epoch_70_163_cliprel.pth
temperature: 0.07         # SupContrastive temperature (NOT InfoNCE 0.1)
warmup_ratio: 0.1         # 10% linear warmup
cosine_floor: 0.1         # cosine schedule floor (NOT 0)
negative_ratio: 0.5       # 50% explicit-negative pairs in DataLoader
log_every: 50
seed: 42

# Scoring weights (Eq. 8: w_emb*cos(z,z) + w_scene*cos(u,u) + w_jac*F1) — used
# only by the eval CLI; left here so configs_dataset can reference them.
w_emb: 0.33
w_scene: 0.33
w_jac: 0.34

# Data paths (override via CLI)
dataset_dir: null          # Training data dir (combined_dataset_clip/ — built by
                           # scripts/retrieval/build_combined_dataset_clip.py)
metadata_path: null        # 3RScan.json (scan_id → reference_id mapping)
save_dir: data/model_checkpoints/graph2graph
pretrained_checkpoint: null

# CLIP model used for node/edge/scene embeddings across all retrieval scripts.
clip_model: ViT-B/32

# SceneGraph constructor params (selects which pre-computed embeddings to load;
# the retrieval model itself re-encodes everything with CLIP, so this only
# affects the legacy node.label_features / edge.features fields)
max_dist: 1.0
embedding_type: word2vec
