# =============================================================================
# Dataset creation configuration — frame selection, NBV/DPP, and annotation.
#
# Contains per-dataset parameters for the ScanScribe creation pipeline
# (Sec 3.1).  Entry points:
#   python -m langloc.dataset.frame_selection.scannetpp_best_views scan_id=<ID>
#   python -m langloc.dataset.frame_selection.3rscan_best_views    scan_id=<ID>
#   python -m langloc.dataset.annotation.generate_descriptions     scan_id=<ID>
# =============================================================================

# Runtime flags (overridable via CLI)
target: 3RScan             # Dataset to process: "scannet" or "3RScan"
debug: false
save_semantic_masks: false
save_instance_masks: false
auto_clean: false

# ------------------------------------------------------------
# ScanNet++ NBV configuration
# ------------------------------------------------------------
scannetpp:
  # Rasterization settings
  image_downsample_factor: 2
  mask_downsample_factor: 1
  semantic_id_key: "nyu40id"
  labelmap_tsv: data/scannetv2-labels.combined.tsv
  subsample_factor: 1
  faces_per_pixel: 2
  bin_size: null
  max_faces_per_bin: null
  blur_radius: 0.0

  # Image quality and selection
  iqa_metric: "qualiclip"
  iqa_threshold: 0.5
  iqa_device: "cuda"
  kmeans_n_clusters: 10
  limit_images: null
  max_best: 120
  min_gain_pixels: 500

  # Object visibility thresholds
  coverage_threshold: 0.02
  min_pixel_count: 100
  min_obj_pixels_for_presence: 100

  # FOV and depth settings
  fov_depth_clip_min: 0.2
  fov_depth_clip_max: 10.0

  # Depth-aware visibility
  depth_visibility_enabled: true
  depth_vis_threshold: 0.20
  depth_consistent_ratio_threshold: 0.30
  min_depth_consistent_pixels: 12

  # NBV algorithm parameters
  nbv_alpha: 0.5
  nbv_min_position_distance: 0.2
  nbv_min_angle_distance: 10.0
  nbv_enable_pose_filtering: true

  # DPP selection
  dpp_enabled: true
  dpp_total_views: 10
  dpp_seed_size: 2
  dpp_stage1_total_views: 25
  dpp_stage2_sigma_position: 0.75
  dpp_stage2_sigma_angle: 20.0
  dpp_stage2_iou_gamma: 1.0
  dpp_clip_model: "ViT-B/32"
  dpp_clip_device: "cuda"

  # Spatial relations parameters
  spatial_max_distance: 2.0
  spatial_size_ratio_threshold: 5.0
  spatial_eps: 0.1

  # Output and cache directories
  cache_dir: cache
  raster_out_dir: cache
  output_folder: output

  # Description generation
  generate_descriptions: true
  description_model: "gpt-5.2"

# ------------------------------------------------------------
# 3RScan NBV configuration
# ------------------------------------------------------------
3rscan:
  # Semantic ID mapping
  semantic_id_key: "global_id"

  # Rasterization settings
  image_downsample_factor: 1
  mask_downsample_factor: 1
  subsample_factor: 1
  faces_per_pixel: 2
  bin_size: null
  max_faces_per_bin: null
  blur_radius: 0.0

  # Image quality and selection
  iqa_metric: "qualiclip"
  iqa_threshold: 0.5
  iqa_device: "cuda"
  kmeans_n_clusters: 10
  limit_images: null
  max_best: 120
  min_gain_pixels: 500

  # Object visibility thresholds
  coverage_threshold: 0.02
  min_pixel_count: 50
  min_obj_pixels_for_presence: 100

  # FOV and depth settings
  fov_depth_clip_min: 0.2
  fov_depth_clip_max: 10.0

  # Depth-aware visibility
  depth_visibility_enabled: true
  depth_vis_threshold: 0.20
  depth_consistent_ratio_threshold: 0.30
  min_depth_consistent_pixels: 12

  # NBV algorithm parameters
  nbv_alpha: 0.5
  nbv_min_position_distance: 0.2
  nbv_min_angle_distance: 10.0
  nbv_enable_pose_filtering: true

  # DPP selection
  dpp_enabled: true
  dpp_total_views: 10
  dpp_seed_size: 2
  dpp_stage1_total_views: 25
  dpp_stage2_sigma_position: 0.75
  dpp_stage2_sigma_angle: 20.0
  dpp_stage2_iou_gamma: 1.0
  dpp_clip_model: "ViT-B/32"
  dpp_clip_device: "cuda"

  # Spatial relations parameters
  spatial_max_distance: 2.0
  spatial_size_ratio_threshold: 5.0
  spatial_eps: 0.1
  spatial_max_surface_distance: 1.5

  # Output and cache directories
  cache_dir: cache_rscan
  raster_out_dir: cache_rscan
  output_folder: output

  # Description generation
  generate_descriptions: true
  description_model: "gpt-5.2"

# ------------------------------------------------------------
# ScanNet download settings
# ------------------------------------------------------------
download:
  label_map_filename: scannetv2-labels.combined.tsv
  file_types:
    - "_vh_clean_2.ply"
    - "_vh_clean_2.labels.ply"
    - "_vh_clean_2.0.010000.segs.json"
    - ".aggregation.json"
    - ".txt"
    - ".sens"
