# =============================================================================
# LLM-as-answerer evaluation settings.
#
# Replaces the oracle with a local causal LM for dialogue question answering.
#
# Run:
#   python -m langloc.eval.llm_answerer \
#       --dialogue_script path/to/dialogue.py \
#       --candidates_json candidates.json \
#       --dataset_root /data/scans
# =============================================================================

# HuggingFace model name or local path.
model_name: "Qwen/Qwen2.5-1.5B-Instruct"

# Use 4-bit quantization (requires bitsandbytes).
load_in_4bit: false

# Maximum candidate frames per scene for the dialogue pool.
max_pool_frames: 30

# Dialogue evaluation mode: "sequential" or "parallel".
eval_mode: "sequential"

# Question selection strategy: "ig" (information gain) or "random".
question_strategy: "ig"

# Enable auto-relax (widens thresholds if question pool is exhausted).
auto_relax: false

# Minimum answerable probability for relation questions.
rel_min_answerable: 0.1

# Include the initial predicted pose in the candidate pool.
include_predicted_pose: true

# Show ground-truth debug info during evaluation.
show_gt_debug: true
