# =============================================================================
# Evaluation settings — controls the top-k retrieval accuracy evaluation.
#
# Run evaluation:
#   python -m langloc.graph_matching.eval eval.model_name=my_model eval.eval_iters=200
# =============================================================================

# Number of outer evaluation iterations (each produces one accuracy estimate).
# Final accuracy is the mean +/- std across these iterations.
eval_iters: 10

# Number of sample sets drawn per outer iteration.
# Each sample set picks `out_of` candidate scenes and checks if the ground-truth
# scene appears in the top-k.
eval_iter_count: 500

# Number of candidate scenes per sample set.
# The query is ranked against this many randomly sampled scenes.
out_of: 10

# List of k values for top-k accuracy reporting.
# e.g. [1, 2, 3, 5] reports top-1, top-2, top-3, and top-5 accuracy.
valid_top_k: [1, 2, 3, 5]

# If true, evaluate against the entire database (overrides `out_of`).
eval_entire_dataset: false

# Evaluate using cosine similarity only (ignore matching probability head).
eval_only_c: false

# Checkpoint filename (without .pt) to load for evaluation (required).
model_name: null

# Use ScanNet-derived graphs instead of 3RScan.
scannet: false

# Use auto-generated ScanScribe captions instead of human-authored ones.
scanscribe_auto_gen: false
