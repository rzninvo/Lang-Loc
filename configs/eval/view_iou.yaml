# =============================================================================
# View IoU evaluation settings.
#
# Controls the frustum-based triangle-overlap IoU computation between
# predicted and ground-truth camera poses.
#
# Run:
#   python -m langloc.eval.view_iou --dataset-root /data --scene-id scene0000_00 \
#       --pred-position 1.0 2.0 3.0 --pred-direction 0 0 1
# =============================================================================

# Horizontal field of view (degrees).
h_fov_deg: 39.31

# Vertical field of view (degrees).
v_fov_deg: 64.76

# Near clipping plane (metres).
near: 0.05

# Far clipping plane (metres). null = no far plane.
far: null
