# =============================================================================
# Training hyperparameters — controls the BigGNN training loop.
#
# Run training:
#   python -m whereami.models.train train.model_name=my_model train.epoch=50
# =============================================================================

# Number of training epochs.
epoch: 30

# Adam optimiser learning rate.
lr: 0.0001

# Adam optimiser weight decay (L2 regularisation).
weight_decay: 5.0e-5

# Number of graph pairs per contrastive batch.
batch_size: 16

# Use contrastive (pairwise) loss. If false, no training loss is computed.
contrastive_loss: true

# Enable k-fold cross-validation during training.
training_with_cross_val: true

# Number of folds for cross-validation.
folds: 10

# If true, run only the first fold then stop (useful for quick validation).
skip_k_fold: false

# If true, train on the entire dataset without cross-validation splits.
entire_training_set: false

# --- Ablation flags ---

# Skip DBSCAN subgraph extraction and use the full graphs directly.
# Useful for measuring the impact of the subgraph matching step.
subgraph_ablation: false

# Loss ablation: train with cosine similarity loss only (drop matching loss).
loss_ablation_m: false

# Loss ablation: train with matching probability loss only (drop cosine loss).
loss_ablation_c: false

# --- Loss weighting ---
# When both losses are active (no ablation), the combined loss is:
#   loss = (w_cosine * L_cosine + w_matching * L_matching) / (w_cosine + w_matching)
# Default 1.0/1.0 gives equal weighting (equivalent to simple average).

# Weight for the cosine similarity loss term.
loss_weight_cosine: 1.0

# Weight for the matching probability loss term.
loss_weight_matching: 1.0

# --- Checkpointing / resume ---

# Resume training from this epoch number (0 = start fresh).
continue_training: 0

# Checkpoint filename (without .pt) to resume from.
continue_training_model: null

# Name for the saved model (required). Checkpoints are saved as
# <model_name>.pt and <model_name>_epoch_N_checkpoint.pt.
model_name: null

# --- Dataset flags ---

# Use ScanNet-derived graphs instead of 3RScan.
scannet: false

# Use auto-generated ScanScribe captions instead of human-authored ones.
scanscribe_auto_gen: false
