# =============================================================================
# Localization settings — controls the pose estimation pipeline.
#
# Run localization:
#   python -m langloc.localization.cli localization.mode=standard
#
# Modes:
#   standard        — grid-based scoring over all poses
#   coarse_to_fine  — hierarchical grid refinement for faster convergence
#   candidates      — rank candidate poses and output top matches
# =============================================================================

# Localization mode (see above).
mode: standard

# Dataset type: "3rscan" or "scannet". Controls mesh loading and label parsing.
dataset: 3rscan

# Grid resolution (metres) for sampling camera positions within the scene.
# Smaller = more positions = finer spatial resolution, but slower.
grid_step: 0.25

# Assumed camera height above the floor (metres) for grid sampling.
eye_height: 1.6

# Nominal cap on matched scene-graph objects (paper notation: K_obj).
# With dynamic_top_k=true (paper default), this is a nominal upper bound;
# the effective retrieval budget is min(query_obj_count, top_k). The
# reference mk5 invocation uses 25 as the cap (the value that produced the
# published numbers); Supp Table 7 / Master Table A.4 list "10" as the
# typical post-adaptation budget on 3RScan caption graphs.
top_k: 25

# Object matching strategy:
#   global_topk     — simple global top-k from cosine similarity (default)
#   per_node        — per-query-node best match, prevents label duplication
#   relation_aware  — per-node + relation consistency re-ranking
matching_strategy: global_topk

# Blend weight for relation_aware matching (0 = pure node sim, 1 = pure relation).
relation_alpha: 0.5

# --- Matching extensions (paper §3.3 / Supp §4.3 / Master §5.5.1) ---
# The Eq. 9-style matcher uses four mechanisms beyond global top-k. These
# parameters are honoured by `topk_matched_objects` once Phase 4 of the mk5
# port lands; they are accepted (no-op) before that.

# Minimum cosine similarity for an accepted query↔scene match (paper s_min).
# Supp Table 7 / Master Table A.4: s_min = 0.1.  Calibrated for the
# Word2Vec re-embedding (300D, spaCy en_core_web_lg) the matcher uses
# when homogenize_label_embeddings=true — cosines typically 0.4-0.95.
score_threshold: 0.1

# Adapt the retrieval budget K to the query-graph size (paper "dynamic top-K
# enabled"). When true, top_k above is treated as a nominal cap.
# Supp Table 7 / Master Table A.4: enabled.
dynamic_top_k: true

# When true, force at least one match per query node before falling back to
# the global similarity ranking (paper "query coverage enabled"). Supp §4.3.
ensure_query_coverage: true

# Apply ℓ₂ normalisation to label embeddings before computing cosine
# similarity (paper homogenize_label_embeddings).
homogenize_label_embeddings: true

# Grounding threshold γ — minimum word2vec similarity for assigning a parsed
# caption-graph node to a `visible_objects` label (parsed-JSON caption path,
# Supp §4.3). Supp Table 7 / Master Table A.4: γ = 0.7.
grounding_threshold: 0.7

# Source of the caption SceneGraph: "raw" reads `visible_objects` directly
# (mk4-style; the structured GT — only useful as an upper-bound debug path);
# "parsed" reads `*_parsed.json` produced by `langloc.dataset.annotation.
# parse_descriptions` (paper protocol — re-parses the natural-language
# `description` via GPT-4o-mini, then grounds nodes back to `visible_objects`
# at the γ threshold). Phase 6 of the mk5 port wires this in; "raw" is the
# only supported value before then.
caption_source: raw

# Embedding aggregation mode for parsed caption-node labels in the parsed-
# JSON path: "token" picks a single representative Word2Vec token vector;
# "doc" averages Word2Vec across the whole label phrase via
# `create_embedding_nlp`. mk5's invocation script for the published numbers
# sets `--query_embedding_mode doc` (overriding mk5's argparse default of
# "token"), so "doc" is the paper-faithful default once Phase 6 lands.
query_embedding_mode: doc

# Downweight generic labels (wall, floor, ceiling) during visibility scoring.
# When true, generic objects contribute 0.1 instead of 1.0 to the visibility count.
use_distinctiveness_weighting: false

# --- Eq. 9 visibility scoring (paper §3.3 / Master Eq. 5.31-5.32) ---
# s_k = Σ vis(o,c_k) + λ_d · Σ exp(-d_ko / α_d), then P_k ∝ exp(s_k / τ).

# Softmax temperature τ for converting raw scores into a posterior.
# Supplementary Table 7 / Master Table A.4: τ = 1.5.
score_tau: 1.5

# Distance-bonus weight λ_d in Eq. 9 (favours grid cells close to matched objects).
# Supplementary Table 7 / Master Table A.4: λ_d = 0.5.
distance_bonus_weight: 0.5

# Distance-bonus decay scale α_d (metres) in Eq. 9.
# Supplementary Table 7 / Master Table A.4: α_d = 2.0 m.
distance_bonus_decay: 2.0

# --- FOV (dataset-dependent) ---
# Camera horizontal field of view (degrees) for visibility checking during
# fine localisation. Supplementary Table 7 / Master Table A.4 list these as
# "Dataset Dependent" — the values below are the 3RScan defaults. ScanNet
# overlays at configs/localization/scannet.yaml swap them to 58.30°/45.33°.
# (NB: the paper's evaluation FOV for 3D View IoU is intentionally wider —
# 100°/60°, see Supp §5.3 — and lives in the metrics module, not here.)
h_fov_deg: 39.31
v_fov_deg: 64.76

# Prediction strategy for selecting the final pose estimate.
#   argmax   — pick the single highest-scoring grid cell
#   random   — sample from the score distribution
#   weighted — weighted average of top grid cells (mean-shift)
prediction_strategy: weighted

# Bandwidth σ (metres) for the Gaussian-density aggregation step
# (Master §5.5.6, Eq. 5.33). Supp Table 7 / Master Table A.4: σ = 1.0 m.
cluster_bandwidth: 1.0

# Maximum number of grid points fed into the density-aggregation step
# (paper notation: N_cluster). Supp Table 7 / Master Table A.4: 50.
max_cluster_points: 50

# List of radii (metres) at which to compute hit-rate metrics.
# A prediction is a "hit" if it falls within this distance of ground truth.
hit_radii: [0.75, 1.0, 1.5, 2.0, 2.5]

# Percentiles for reporting the probability mass around the ground truth.
mass_percentiles: [50.0, 90.0]

# Minimum distance (metres) between top-k predictions to ensure diversity.
top_k_min_dist: 10

# Policy for selecting which camera frame to use per scene.
#   max_visible — pick the frame with the most visible objects
frame_policy: max_visible

# Specific frame index to use (overrides frame_policy if set).
frame_index: 0

# Stride for arrow visualisation (show every N-th arrow).
arrow_stride: 2

# Length of visualisation arrows (0.0 = auto-scale).
arrow_len: 0.0

# Number of top poses to visualise.
top_pose_count: 5

# Show 2D heatmap overlay of score distribution.
show_heatmap: false

# Show directional arrows on the heatmap.
show_arrows: false

# Show interactive 3D Open3D visualisation.
show_3d: false

# --- Scene data paths ---

# Root directory of the 3RScan dataset (required).
# Reads from the shared paths config (paths.rscan_root = ./data/3rscan).
root: ${paths.rscan_root}

# Directory containing processed graph .pt files.
graphs: ${paths.graphs_dir}

# Optional directory for pre-built query graphs.
query_root: null

# List of specific scene IDs to evaluate. If null, uses all available scenes.
scene_ids: null

# Random seed for scene sampling (separate from the global seed).
seed: 42

# Maximum number of scenes to evaluate. If null, evaluate all.
max_scenes: null

# Single scene ID to visualise in detail (triggers per-scene visualisation).
visualize_scene: null

# --- Coarse-to-fine parameters ---

# Small epsilon added to probabilities to avoid log(0).
prob_eps: 1.0e-6

# Hit radius (metres) for the simple coarse-to-fine scoring mode.
hit_radius: 0.5

# Initial coarse grid step (metres) before refinement.
coarse_grid_step: 2.0

# Number of hierarchical refinement levels.
coarse_refine_levels: 3

# Factor by which grid step shrinks at each refinement level.
coarse_refine_factor: 2.0

# Fraction of grid cells to keep at each refinement level.
coarse_keep_ratio: 0.7

# Number of top cells to keep after the final refinement.
coarse_top_k: 16

# Disable non-maximum suppression during refinement.
coarse_disable_nms: false

# --- Candidates-mode parameters ---

# Number of top candidate scenes to return.
top_candidates: 10

# Number of top poses per candidate scene.
top_pose_candidates: 10

# Optional path to write candidate results as JSON.
output_json: ${paths.eval_output_dir}/candidates.json

# --- Output paths ---

# Path to save evaluation metrics as JSON.
save_metrics: ${paths.eval_output_dir}/eval_metrics.json

# Path to write a run log file.
log_file: ${paths.eval_output_dir}/eval_loc_summary.log
