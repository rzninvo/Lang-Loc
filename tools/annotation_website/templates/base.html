<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>{% block title %}LangLoc{% endblock %}</title>
  <link rel="preconnect" href="/static" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'&gt;&lt;rect width='32' height='32' rx='8' fill='%238a88ff'/&gt;&lt;circle cx='16' cy='16' r='5' fill='white'/&gt;&lt;/svg&gt;" />
</head>
<body class="page-{{ page_class | default('default') }}">

  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page-glow" aria-hidden="true"></div>

  <nav class="navbar" aria-label="Primary">
    <div class="navbar-inner">
      <a href="/" class="brand" aria-label="LangLoc home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-primary">LangLoc</span>
          <span class="brand-sub">describe</span>
        </span>
      </a>

      <div class="navlinks">
        {% if chosen_dataset %}
          <a href="/datasets" class="dataset-pill" title="Switch dataset">
            <span class="dataset-pill-key">{{ chosen_dataset }}</span>
            <span class="dataset-pill-switch">switch</span>
          </a>
        {% endif %}
        <a href="/annotate" class="navlink {% if page_class == 'annotate' %}active{% endif %}">Describe</a>
        <a href="/localize" class="navlink {% if page_class == 'localize' %}active{% endif %}">Localize</a>
        <a href="/history" class="navlink {% if page_class == 'history' %}active{% endif %}">My work</a>
        <a href="/about" class="navlink {% if page_class == 'about' %}active{% endif %}">About</a>
      </div>
    </div>
  </nav>

  <main id="main" class="page-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logos" aria-label="University affiliations">
        <a href="https://ethz.ch/" target="_blank" rel="noopener" aria-label="ETH Zürich">
          <img src="/static/img/eth_logo_kurz_neg.png" alt="ETH Zürich" class="logo-eth" />
        </a>
        <a href="https://www.uzh.ch/" target="_blank" rel="noopener" aria-label="University of Zurich">
          <img src="/static/img/uzh-logo-white.png" alt="University of Zurich" class="logo-uzh" />
        </a>
        <a href="https://cvg.ethz.ch/" target="_blank" rel="noopener" aria-label="ETH Computer Vision Group">
          <img src="/static/img/cvg_logo_colour-white.png" alt="ETH Computer Vision Group" class="logo-cvg" />
        </a>
      </div>
      <div class="footer-meta">
        <span>LangLoc &middot; language-based 3D indoor localisation</span>
        <span class="footer-divider" aria-hidden="true">·</span>
        <a href="/about">About &amp; data use</a>
      </div>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
