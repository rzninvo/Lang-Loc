# ============================================================
# Default configuration for ScanNet++-style keyframe pipeline
# ============================================================

# ------------------------------------------------------------
# Rendering parameters (for image_generator.py)
# ------------------------------------------------------------
render:
  resolution:
    width: 1920          # Render width
    height: 1080         # Render height
  fov: 75                # Field of view in degrees
  fov_type: vertical     # "vertical" or "horizontal"
  radius: 1.5            # Distance of virtual camera from scene center
  height: 1.0            # Camera height above ground
  num_views: 38          # Number of candidate views to sample
  up_vector: [0, 0, 1]   # World up direction
  output_folder: output  # Subfolder where outputs are written

# ------------------------------------------------------------
# Keyframe selection (for keyframe.py)
# ------------------------------------------------------------
keyframe:
  num_frames: 6          # Number of keyframes to select per scene
  blur_threshold: 150.0  # Threshold for rejecting blurry frames
  voxel_size: 0.02       # Downsampling voxel size for geometry
  kmeans_n_init: 10      # KMeans init count
  kmeans_max_iter: 300   # Max iterations for KMeans
  kmeans_tol: 0.0001     # Convergence tolerance
  max_retries: 3         # Retry attempts if selection fails

# ------------------------------------------------------------
# ScanNet++ NBV configuration (for scannetpp_best_views.py)
# ------------------------------------------------------------
scannetpp:
  image_downsample_factor: 2   # Downsample factor for NBV rasterization
  mask_downsample_factor: 1    # Downsample factor for masks
  semantic_id_key: "nyu40id"   # Semantic label key ("nyu40id" or "id")
  labelmap_tsv: data/scannetv2-labels.combined.tsv
  subsample_factor: 1
  faces_per_pixel: 2
  bin_size: null
  max_faces_per_bin: null
  blur_radius: 0.0
  imq_threshold: 30.0          # BRISQUE image quality threshold
  kmeans_n_clusters: 10        # Number of pose clusters for diversity
  cache_dir: cache   # Where to store intermediate caches
  raster_out_dir: cache
  limit_images: null           # Optional cap on candidate images
  max_best: 120                # Max frames kept in pre-selection
  min_gain_pixels: 500         # Min new pixels gained per view
  output_folder: output
  generate_descriptions: true
  description_model: "gpt-4o-mini"
  pixel_threshold: 500

# ------------------------------------------------------------
# 3RScan NBV configuration (for 3rscan_best_views.py)
# ------------------------------------------------------------
3rscan:
  image_downsample_factor: 2   # Downsample factor for NBV rasterization
  mask_downsample_factor: 1    # Downsample factor for masks
  subsample_factor: 1          # Keep every Nth frame
  faces_per_pixel: 2
  bin_size: null
  max_faces_per_bin: null
  blur_radius: 0.0
  imq_threshold: 30.0          # BRISQUE image quality threshold
  kmeans_n_clusters: 10        # Number of pose clusters for diversity
  cache_dir: cache_rscan       # Where to store intermediate caches
  raster_out_dir: cache_rscan
  limit_images: null           # Optional cap on candidate images
  max_best: 120                # Max frames kept in pre-selection
  min_gain_pixels: 500         # Min new pixels gained per view
  output_folder: output

# ------------------------------------------------------------
# File system paths
# ------------------------------------------------------------
paths:
  base_data_dir: data
  scannet_dataset_path: data/scans
  3rscan_dataset_path: data/3RScan  
  annotations_file_scannet: results/annotations_scannet.json
  uninterpretable_file_scannet: results/uninterpretable_scannet.json
  annotations_file_3rscan: results/annotations_3rscan.json
  uninterpretable_file_3rscan: results/uninterpretable_3rscan.json
  camera_pose_file: camera_pose.json
  download_script: scripts/download_subset.sh
  3rscan_release_scans_file: config/3RScan_release_scans.txt

# ------------------------------------------------------------
# Download settings
# ------------------------------------------------------------
download:
  label_map_filename: scannetv2-labels.combined.tsv
  file_types:
    - "_vh_clean_2.ply"
    - "_vh_clean_2.labels.ply"
    - "_vh_clean_2.0.010000.segs.json"
    - ".aggregation.json"
    - ".txt"
    - ".sens"

# ------------------------------------------------------------
# UI defaults (for demo / annotation)
# ------------------------------------------------------------
ui:
  sample_scene: scene0000_00
  sample_view: 004309.jpg
  sample_description: >
    A part of a kitchen. In the middle there is a fridge, to the left of
    the fridge are cabinets with a sink, dishes and utensils. To the right
    of the fridge are two trash cans. A doorknob is visible to the right
    of the trash cans.
  sample_scene_3rscan: 8e0f1c2f-9e28-2339-85ae-05fc50d1a3a7
  sample_view_3rscan: 000123.jpg
  sample_description_3rscan: "Kitchen area with counter, sink, fridge..."
