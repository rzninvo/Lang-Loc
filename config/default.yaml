render:
  resolution:
    width: 1920
    height: 1080
  fov: 75
  fov_type: vertical  # options: vertical, horizontal
  radius: 1.5
  height: 1.0
  num_views: 38
  up_vector: [0, 0, 1]
  output_folder: output

keyframe:
  num_frames: 6
  blur_threshold: 150.0
  voxel_size: 0.02
  kmeans_n_init: 10
  kmeans_max_iter: 300
  kmeans_tol: 0.0001
  max_retries: 3  # Maximum retries for keyframe generation

scannetpp:
  image_downsample_factor: 2  # 1 = full res; can set 2 if you want smaller images
  mask_downsample_factor: 1     # 1 = full res; can set 2 if you want smaller masks
  semantic_id_key: "nyu40id"    # or "id" if you use scannet20 ids; see TSV
  labelmap_tsv: "data/scannetv2-labels.combined.tsv"
  subsample_factor: 1
  faces_per_pixel: 2
  bin_size: null
  max_faces_per_bin: null
  blur_radius: 0.0
  imq_threshold: 30.0  # BRISQUE score threshold for image quality
  kmeans_n_clusters: 10
  cache_dir: cache_scannetpp
  raster_out_dir: cache_scannetpp
  limit_images: null
  max_best: 120
  min_gain_pixels: 500

  output_folder: output

paths:
  base_data_dir: data
  dataset_path: data/scans
  annotations_file: data/results/scannet_annotations.json
  uninterpretable_file: data/results/uninterpretable_images.json
  camera_pose_file: camera_pose.json
  download_script: scripts/download_subset.sh

download:
  label_map_filename: scannetv2-labels.combined.tsv
  file_types:
    - "_vh_clean_2.ply"
    - "_vh_clean_2.labels.ply"
    - "_vh_clean_2.0.010000.segs.json"
    - ".aggregation.json"
    - ".txt"
    - ".sens"

ui:
  sample_scene: scene0000_00
  sample_view: 004309.jpg
  sample_description: >
      A part of a kitchen. In the middle there is a fridge, to the left of the fridge are cabinets with a sink, dishes and utensils. To the right of the fridge are two trash cans. A doorknob is visible to the right of trash cans. 
